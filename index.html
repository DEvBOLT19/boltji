<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vivah Suchna — Marriage Event Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #E8650A;
    --deep-red: #8B1A1A;
    --gold: #C9922A;
    --cream: #FDF6EC;
    --ivory: #FAF0D7;
    --text-dark: #1A0A00;
    --text-mid: #5C3317;
    --card-bg: #FFFAF2;
    --shadow: rgba(139,26,26,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 10% 20%, rgba(232,101,10,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(201,146,42,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    text-align: center;
    padding: 52px 20px 36px;
    position: relative;
    z-index: 1;
  }

  .mandala-line {
    font-size: 22px;
    letter-spacing: 10px;
    color: var(--gold);
    margin-bottom: 12px;
    opacity: 0.7;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    color: var(--deep-red);
    line-height: 1.15;
    margin-bottom: 6px;
  }

  header h1 span {
    color: var(--saffron);
    font-style: italic;
  }

  header p {
    color: var(--text-mid);
    font-size: 0.95rem;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .divider {
    width: 120px;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 16px auto;
  }

  .search-section {
    max-width: 480px;
    margin: 0 auto 40px;
    padding: 0 20px;
    position: relative;
    z-index: 1;
  }

  .search-box {
    background: var(--card-bg);
    border: 1.5px solid rgba(201,146,42,0.35);
    border-radius: 16px;
    padding: 28px 30px;
    box-shadow: 0 8px 32px var(--shadow);
    text-align: center;
  }

  .search-box label {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    color: var(--deep-red);
    margin-bottom: 16px;
  }

  .date-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  input[type="date"] {
    padding: 12px 18px;
    border: 1.5px solid rgba(232,101,10,0.4);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    background: var(--ivory);
    color: var(--text-dark);
    outline: none;
    transition: border 0.2s, box-shadow 0.2s;
    cursor: pointer;
    flex: 1;
    min-width: 160px;
  }

  input[type="date"]:focus {
    border-color: var(--saffron);
    box-shadow: 0 0 0 3px rgba(232,101,10,0.12);
  }

  .search-btn {
    padding: 12px 28px;
    background: linear-gradient(135deg, var(--saffron), var(--deep-red));
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 14px rgba(139,26,26,0.25);
    white-space: nowrap;
  }

  .search-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(139,26,26,0.35);
  }

  .search-btn:active { transform: translateY(0); }

  .results-section {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px 60px;
    position: relative;
    z-index: 1;
  }

  .results-header {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeUp 0.4s ease;
  }

  .results-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--deep-red);
  }

  .count-badge {
    display: inline-block;
    background: var(--saffron);
    color: white;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 3px 12px;
    border-radius: 20px;
    margin-left: 10px;
    vertical-align: middle;
    font-family: 'DM Sans', sans-serif;
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    animation: fadeUp 0.4s ease;
  }

  .no-results .icon { font-size: 3rem; margin-bottom: 12px; }

  .no-results h3 {
    font-family: 'Playfair Display', serif;
    color: var(--text-mid);
    font-size: 1.3rem;
    margin-bottom: 6px;
  }

  .no-results p { color: var(--text-mid); font-size: 0.9rem; opacity: 0.7; }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--card-bg);
    border: 1.5px solid rgba(201,146,42,0.25);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 20px var(--shadow);
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 30px rgba(139,26,26,0.18);
  }

  .card-number {
    position: absolute;
    top: 14px;
    right: 16px;
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--gold);
    opacity: 0.3;
    font-weight: 700;
    line-height: 1;
  }

  .card-organiser {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    color: var(--deep-red);
    margin-bottom: 14px;
    padding-right: 36px;
  }

  .card-detail {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 9px;
    font-size: 0.88rem;
  }

  .card-detail .icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

  .card-detail .label {
    color: var(--text-mid);
    font-weight: 500;
    min-width: 58px;
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .card-detail .value { color: var(--text-dark); }

  .card-time-badge {
    display: inline-block;
    background: linear-gradient(135deg, rgba(232,101,10,0.12), rgba(201,146,42,0.12));
    border: 1px solid rgba(232,101,10,0.25);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.82rem;
    color: var(--saffron);
    font-weight: 500;
    margin-top: 12px;
  }

  .card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(to right, var(--saffron), var(--gold));
    border-radius: 0 0 14px 14px;
    opacity: 0.6;
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }
  .card:nth-child(5) { animation-delay: 0.25s; }
  .card:nth-child(6) { animation-delay: 0.3s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  footer {
    text-align: center;
    padding: 20px;
    color: var(--text-mid);
    font-size: 0.8rem;
    opacity: 0.5;
    position: relative;
    z-index: 1;
  }

  @media (max-width: 480px) {
    header { padding: 36px 16px 24px; }
    .search-box { padding: 22px 18px; }
    .date-row { flex-direction: column; }
    input[type="date"], .search-btn { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="mandala-line">❋ ❋ ❋</div>
  <h1>Vivah <span>Suchna</span></h1>
  <p>Marriage Event Directory — Find all events by date</p>
  <div class="divider"></div>
</header>

<div class="search-section">
  <div class="search-box">
    <label>Select a Date to View Marriages</label>
    <div class="date-row">
      <input type="date" id="datePicker" />
      <button class="search-btn" onclick="searchDate()">🔍 Search</button>
    </div>
  </div>
</div>

<div class="results-section" id="resultsSection"></div>

<footer>Vivah Suchna &nbsp;•&nbsp; Marriage Event Finder</footer>

<script>
  let marriageData = [];

  // Load marriages.json from the same folder on page load
  fetch('marriages.json')
    .then(res => {
      if (!res.ok) throw new Error('Could not load marriages.json');
      return res.json();
    })
    .then(data => {
      marriageData = data;
    })
    .catch(err => {
      console.error(err);
      document.getElementById('resultsSection').innerHTML = `
        <div class="no-results">
          <div class="icon">⚠️</div>
          <h3>Data file not found</h3>
          <p>Make sure <strong>marriages.json</strong> is in the same folder as this file.</p>
        </div>`;
    });

  document.getElementById('datePicker').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchDate();
  });

  function searchDate() {
    const val = document.getElementById('datePicker').value;
    if (!val) { showToast("⚠️ Please select a date first."); return; }

    const [y, m, d] = val.split('-');
    const formatted = `${d}/${m}/${y}`;
    const results = marriageData.filter(e => e.date === formatted);
    renderResults(results, formatted);
  }

  function renderResults(results, dateStr) {
    const section = document.getElementById('resultsSection');

    if (results.length === 0) {
      section.innerHTML = `
        <div class="no-results">
          <div class="icon">🌸</div>
          <h3>No events found</h3>
          <p>No marriages are scheduled for <strong>${dateStr}</strong></p>
        </div>`;
      return;
    }

    const cards = results.map((r, i) => `
      <div class="card">
        <div class="card-number">${String(i + 1).padStart(2, '0')}</div>
        <div class="card-organiser">${r.organiser}</div>
        <div class="card-detail">
          <span class="icon">🏘️</span>
          <span class="label">Village</span>
          <span class="value">${r.village}</span>
        </div>
        <div class="card-detail">
          <span class="icon">📍</span>
          <span class="label">Place</span>
          <span class="value">${r.place}</span>
        </div>
        <div class="card-detail">
          <span class="icon">📅</span>
          <span class="label">Date</span>
          <span class="value">${r.date}</span>
        </div>
        <div class="card-time-badge">⏰ ${r.time}</div>
      </div>
    `).join('');

    section.innerHTML = `
      <div class="results-header">
        <h2>Marriages on ${dateStr} <span class="count-badge">${results.length} event${results.length > 1 ? 's' : ''}</span></h2>
      </div>
      <div class="cards-grid">${cards}</div>
    `;
  }

  function showToast(msg) {
    const old = document.getElementById('toast');
    if (old) old.remove();
    const t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      background:#1A0A00;color:#FDF6EC;padding:10px 22px;border-radius:30px;
      font-size:0.88rem;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.2);`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }
</script>
</body>
</html>
